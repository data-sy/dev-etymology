<?xml version="1.0" encoding="UTF-8"?>
<!-- DevEtym 앱 아이콘 · v1 (deprecated) · full
     사용 사이즈: 120pt 이상 (App Store, iPhone home 60@2x/3x, iPad 76@2x, 83.5@2x)
     포함 요소: 이중 테두리 + 상·하 장식 라인 + 개발/어원 타이포 + 사전 라벨 박스
     출처: docs/icon/icon_candidate_v1.html (HERO 섹션)
     상태: v2(미니멀) 채택으로 대체됨. 이력 보존용. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="#2E5D3A"/>

  <!-- 이중 테두리 -->
  <rect x="70" y="70" width="884" height="884" rx="24"
        fill="none" stroke="#F7E8D0" stroke-width="18"/>
  <rect x="110" y="110" width="804" height="804" rx="18"
        fill="none" stroke="#F7E8D0" stroke-width="5"/>

  <!-- 상단 장식 라인 -->
  <line x1="200" y1="242" x2="824" y2="242" stroke="#F7E8D0" stroke-width="6"/>
  <line x1="260" y1="268" x2="764" y2="268" stroke="#F7E8D0" stroke-width="3"/>

  <!-- 개발 -->
  <text x="512" y="490" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', 'Noto Sans CJK KR', 'Pretendard', sans-serif"
        font-weight="900" font-size="260"
        fill="#F7E8D0"
        letter-spacing="24">개발</text>
  <!-- 어원 -->
  <text x="512" y="740" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', 'Noto Sans CJK KR', 'Pretendard', sans-serif"
        font-weight="900" font-size="260"
        fill="#F7E8D0"
        letter-spacing="24">어원</text>

  <!-- 하단 장식 라인 -->
  <line x1="260" y1="778" x2="764" y2="778" stroke="#F7E8D0" stroke-width="3"/>
  <line x1="200" y1="802" x2="824" y2="802" stroke="#F7E8D0" stroke-width="6"/>

  <!-- 하단 "사전" 라벨 박스 -->
  <rect x="408" y="840" width="208" height="86" rx="4" fill="#F7E8D0"/>
  <text x="512" y="904" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', 'Noto Sans CJK KR', sans-serif"
        font-weight="900" font-size="60"
        fill="#2E5D3A"
        letter-spacing="14">사전</text>
</svg>
