<?xml version="1.0" encoding="UTF-8"?>
<!-- DevEtym launch screen logo · transparent background, cream foreground
     사용처: Info.plist UILaunchScreen.UIImageName ("LaunchLogo")
     배경색은 별도 Color Asset (Theme/brand · #2E5D3A) 사용.
     아이콘(v2 icon.svg)에서 배경 rect만 제거한 동일 구성으로
     앱 아이콘 → 런치 화면 → 첫 화면의 시각 연속성 확보. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <text x="512" y="410" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', 'Noto Sans CJK KR', 'Pretendard', sans-serif"
        font-weight="900" font-size="320"
        fill="#F7E8D0"
        letter-spacing="16">개발</text>
  <text x="512" y="720" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', 'Noto Sans CJK KR', 'Pretendard', sans-serif"
        font-weight="900" font-size="320"
        fill="#F7E8D0"
        letter-spacing="16">어원</text>

  <rect x="336" y="790" width="352" height="156" rx="18" fill="#F7E8D0"/>
  <text x="512" y="912" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', 'Noto Sans CJK KR', sans-serif"
        font-weight="900" font-size="116"
        fill="#2E5D3A"
        letter-spacing="10">사전</text>
</svg>
